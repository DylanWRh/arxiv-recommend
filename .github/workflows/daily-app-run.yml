name: Daily app run

on:
  schedule:
    - cron: '5 12 * * *'
  workflow_dispatch:

concurrency:
  group: daily-paper-recommender
  cancel-in-progress: false

jobs:
  run-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Require state repo token
        env:
          STATE_REPO_TOKEN: ${{ secrets.STATE_REPO_TOKEN }}
        run: |
          if [ -z "$STATE_REPO_TOKEN" ]; then
            echo "Set the STATE_REPO_TOKEN secret before running the workflow."
            exit 1
          fi

      - name: Checkout state repo
        uses: actions/checkout@v4
        with:
          repository: DylanWRh/arxiv-recommend-state
          token: ${{ secrets.STATE_REPO_TOKEN }}
          path: data

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Require private recipient for scheduled runs
        if: github.event_name == 'schedule'
        env:
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ -z "$EMAIL_TO" ]; then
            echo "Set the EMAIL_TO secret before enabling scheduled delivery."
            exit 1
          fi

      - name: Build .env
        shell: bash
        env:
          RESEARCH_PROFILE: ${{ vars.RESEARCH_PROFILE }}
          APP_TIMEZONE: ${{ vars.APP_TIMEZONE }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          OUTPUT_PATH: ${{ vars.OUTPUT_PATH }}
          RECOMMENDATIONS_DB_PATH: ${{ vars.RECOMMENDATIONS_DB_PATH }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          TIME_PARSE_MODEL: ${{ vars.TIME_PARSE_MODEL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          LLM_BATCH_SIZE: ${{ vars.LLM_BATCH_SIZE }}
          LLM_TIMEOUT: ${{ vars.LLM_TIMEOUT }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USE_TLS: ${{ vars.SMTP_USE_TLS }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          cp .env.example .env

          append_if_set() {
            local key="$1"
            local value="$2"
            if [ -n "$value" ]; then
              printf '%s=%s\n' "$key" "$value" >> .env
            fi
          }

          append_if_set RESEARCH_PROFILE "$RESEARCH_PROFILE"
          append_if_set APP_TIMEZONE "$APP_TIMEZONE"
          append_if_set EMAIL_TO "$EMAIL_TO"
          append_if_set OUTPUT_PATH "$OUTPUT_PATH"
          append_if_set RECOMMENDATIONS_DB_PATH "$RECOMMENDATIONS_DB_PATH"

          append_if_set OPENAI_API_KEY "$OPENAI_API_KEY"
          append_if_set OPENAI_MODEL "$OPENAI_MODEL"
          append_if_set TIME_PARSE_MODEL "$TIME_PARSE_MODEL"
          append_if_set OPENAI_BASE_URL "$OPENAI_BASE_URL"
          append_if_set LLM_BATCH_SIZE "$LLM_BATCH_SIZE"
          append_if_set LLM_TIMEOUT "$LLM_TIMEOUT"

          append_if_set SMTP_HOST "$SMTP_HOST"
          append_if_set SMTP_PORT "$SMTP_PORT"
          append_if_set SMTP_USE_TLS "$SMTP_USE_TLS"
          append_if_set SMTP_USER "$SMTP_USER"
          append_if_set SMTP_PASS "$SMTP_PASS"
          append_if_set EMAIL_FROM "$EMAIL_FROM"

      - name: Validate required action config
        shell: bash
        run: |
          read_env() {
            awk -F= -v key="$1" '$1 == key { value = substr($0, index($0, "=") + 1) } END { print value }' .env
          }

          require_real_value() {
            local key="$1"
            local placeholder="$2"
            local value
            value="$(read_env "$key")"
            if [ -z "$value" ] || [ "$value" = "$placeholder" ]; then
              echo "$key is not configured for GitHub Actions."
              exit 1
            fi
          }

          require_real_value OPENAI_API_KEY ""
          require_real_value EMAIL_TO "you@example.com"
          require_real_value SMTP_USER "your-gmail-address@gmail.com"
          require_real_value SMTP_PASS "your-gmail-app-password"
          require_real_value EMAIL_FROM "your-gmail-address@gmail.com"

      - name: Run app
        run: python app.py --dbg --send-email

      - name: Commit recommendations database
        shell: bash
        env:
          RECOMMENDATIONS_DB_PATH: ${{ vars.RECOMMENDATIONS_DB_PATH }}
        run: |
          db_path="${RECOMMENDATIONS_DB_PATH:-data/recommendations.db}"
          case "$db_path" in
            ./data/*) state_db_path="${db_path#./data/}" ;;
            data/*) state_db_path="${db_path#data/}" ;;
            *)
              echo "RECOMMENDATIONS_DB_PATH must point inside data/: $db_path"
              exit 1
              ;;
          esac

          if [ ! -f "$db_path" ]; then
            echo "No recommendations database found at $db_path."
            exit 0
          fi

          git -C data config user.name "github-actions[bot]"
          git -C data config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C data add "$state_db_path"

          if git -C data diff --cached --quiet; then
            echo "Recommendations database unchanged."
            exit 0
          fi

          git -C data commit -m "Update recommendations database"
          git -C data push
